<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat 💬</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
<meta name="theme-color" content="#87CEEB">
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'lightblue');</script>
</head>
<body class="chat-body" data-theme="lightblue">

<header class="topbar">
  <button id="menuBtn" class="icon-btn"><i class="fa-solid fa-bars"></i></button>
  <div class="topbar-title"><i class="fa-solid fa-heart"></i><span>Our Chat</span></div>
  <div class="topbar-actions">
    <button id="searchBtn" class="icon-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
    <button id="themeBtn" class="icon-btn"><i class="fa-solid fa-palette"></i></button>
  </div>
</header>

<div id="searchBar" class="search-bar hidden">
  <i class="fa-solid fa-magnifying-glass"></i>
  <input type="text" id="searchInput" placeholder="Search messages...">
  <button id="closeSearch" class="icon-btn small"><i class="fa-solid fa-xmark"></i></button>
</div>

<aside id="sideMenu" class="side-menu">
  <div class="profile-section">
    <div class="profile-pic" id="profilePic"><i class="fa-solid fa-user"></i></div>
    <h3 id="userName">User</h3>
    <label class="upload-btn"><i class="fa-solid fa-camera"></i> Change Photo<input type="file" id="profileUpload" accept="image/*" hidden></label>
  </div>
  <nav class="menu-nav">
    <a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a>
    <a href="chat.html" class="active"><i class="fa-solid fa-comments"></i> Chat</a>
    <a href="music.html"><i class="fa-solid fa-music"></i> Music</a>
    <a href="memories.html"><i class="fa-solid fa-images"></i> Memories</a>
    <a href="othersites.html"><i class="fa-solid fa-globe"></i> Other Sites</a>
    <a href="countdown.html"><i class="fa-solid fa-clock"></i> Countdown</a>
    <button id="logoutBtn" class="menu-btn danger"><i class="fa-solid fa-right-from-bracket"></i> Reset Name</button>
  </nav>
</aside>
<div id="overlay" class="overlay"></div>

<div id="themePicker" class="theme-picker">
  <h3><i class="fa-solid fa-palette"></i> Choose Theme</h3>
  <div class="theme-grid">
    <div class="theme-option" data-theme="lightblue" style="background:#87CEEB"><span>Light Blue</span></div>
    <div class="theme-option" data-theme="pink" style="background:#FFB6C1"><span>Pink</span></div>
    <div class="theme-option" data-theme="purple" style="background:#B19CD9"><span>Purple</span></div>
    <div class="theme-option" data-theme="mint" style="background:#98FB98"><span>Mint</span></div>
    <div class="theme-option" data-theme="peach" style="background:#FFDAB9"><span>Peach</span></div>
    <div class="theme-option" data-theme="lavender" style="background:#E6E6FA"><span>Lavender</span></div>
  </div>
  <button id="closeTheme" class="btn-secondary">Close</button>
</div>

<div id="typingIndicator" class="typing-indicator hidden">
  <span class="typing-name"></span> is typing
  <div class="typing-dots"><span></span><span></span><span></span></div>
</div>

<main class="chat-container">
  <div id="pinnedMessages" class="pinned-messages hidden">
    <div class="pinned-header"><i class="fa-solid fa-thumbtack"></i><span>Pinned Messages</span><button id="closePinned" class="icon-btn small"><i class="fa-solid fa-xmark"></i></button></div>
    <div id="pinnedList"></div>
  </div>
  <div id="messages" class="messages"></div>
</main>

<div id="replyPreview" class="reply-preview hidden">
  <div class="reply-content"><i class="fa-solid fa-reply"></i><div><div class="reply-name" id="replyName"></div><div class="reply-text" id="replyText"></div></div></div>
  <button id="cancelReply" class="icon-btn small"><i class="fa-solid fa-xmark"></i></button>
</div>

<footer class="chat-input">
  <button id="attachBtn" class="icon-btn"><i class="fa-solid fa-plus"></i></button>
  <button id="emojiBtn" class="icon-btn"><i class="fa-solid fa-face-smile"></i></button>
  <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
  <button id="sendBtn" class="icon-btn send"><i class="fa-solid fa-paper-plane"></i></button>
</footer>

<div id="attachMenu" class="attach-menu hidden">
  <button id="imageBtn"><i class="fa-solid fa-image" style="color:#4CAF50"></i><span>Photo</span></button>
  <button id="locationBtn"><i class="fa-solid fa-location-dot" style="color:#F44336"></i><span>Location</span></button>
  <button id="voiceRecordBtn"><i class="fa-solid fa-microphone" style="color:#9C27B0"></i><span>Voice</span></button>
  <input type="file" id="imageUpload" accept="image/*" hidden>
</div>

<div id="emojiPicker" class="emoji-picker">
  <div class="emoji-grid">
    <span>❤️</span><span>😍</span><span>😘</span><span>🥰</span><span>💕</span><span>💖</span>
    <span>💗</span><span>💘</span><span>💝</span><span>💞</span><span>😂</span><span>🤣</span>
    <span>😊</span><span>😎</span><span>🤗</span><span>🥺</span><span>😭</span><span>😅</span>
    <span>🤭</span><span>🙈</span><span>👍</span><span>👎</span><span>👏</span><span>🙌</span>
  </div>
</div>

<div id="reactionPicker" class="reaction-picker">
  <span data-reaction="❤️">❤️</span><span data-reaction="😍">😍</span><span data-reaction="😂">😂</span>
  <span data-reaction="😮">😮</span><span data-reaction="😢">😢</span><span data-reaction="👍">👍</span>
</div>

<div id="msgOptions" class="msg-options hidden">
  <button data-action="reply"><i class="fa-solid fa-reply"></i> Reply</button>
  <button data-action="copy"><i class="fa-solid fa-copy"></i> Copy</button>
  <button data-action="edit" id="editMsgBtn" class="hidden"><i class="fa-solid fa-pen"></i> Edit</button>
  <button data-action="delete" id="deleteMsgBtn" class="hidden"><i class="fa-solid fa-trash"></i> Delete</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDKKUQUAcRyMeugjQRJ06TfdN2qfLgpRMA",
  authDomain: "chatweb-3ecb0.firebaseapp.com",
  projectId: "chatweb-3ecb0",
  storageBucket: "chatweb-3ecb0.firebasestorage.app",
  messagingSenderId: "348010514098",
  appId: "1:348010514098:web:93023cd4faf9d443232bab",
  measurementId: "G-ZQY3V6PR2K",
  databaseURL: "https://chatweb-3ecb0-default-rtdb.firebaseio.com/"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const rtdb = getDatabase(app);

const userName = localStorage.getItem('userName');
if (!userName) { window.location.href = 'index.html'; }
document.getElementById('userName').textContent = userName;

const profilePic = localStorage.getItem('profilePic_' + userName);
if (profilePic) document.getElementById('profilePic').innerHTML = `<img src="${profilePic}" alt="profile">`;
document.getElementById('profileUpload').addEventListener('change', (e) => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => { localStorage.setItem('profilePic_' + userName, ev.target.result); document.getElementById('profilePic').innerHTML = `<img src="${ev.target.result}" alt="profile">`; };
  reader.readAsDataURL(file);
});

const savedTheme = localStorage.getItem('theme') || 'lightblue';
document.body.setAttribute('data-theme', savedTheme);
document.getElementById('themeBtn').addEventListener('click', () => document.getElementById('themePicker').classList.add('active'));
document.getElementById('closeTheme').addEventListener('click', () => document.getElementById('themePicker').classList.remove('active'));
document.querySelectorAll('.theme-option').forEach(opt => {
  opt.addEventListener('click', () => {
    document.documentElement.setAttribute('data-theme', opt.dataset.theme);
    document.body.setAttribute('data-theme', opt.dataset.theme);
    localStorage.setItem('theme', opt.dataset.theme);
  });
});

const sideMenu = document.getElementById('sideMenu');
const overlay = document.getElementById('overlay');
document.getElementById('menuBtn').addEventListener('click', () => { sideMenu.classList.add('open'); overlay.classList.add('active'); });
overlay.addEventListener('click', () => { sideMenu.classList.remove('open'); overlay.classList.remove('active'); closeAllPopups(); });
document.getElementById('logoutBtn').addEventListener('click', () => { if (confirm('Are you sure?')) { localStorage.removeItem('userName'); window.location.href = 'index.html'; } });

const presenceRef = ref(rtdb, 'presence/' + userName);
const lastSeenRef = ref(rtdb, 'lastSeen/' + userName);
set(presenceRef, { online: true, timestamp: Date.now() });
window.addEventListener('beforeunload', () => { set(presenceRef, { online: false, timestamp: Date.now() }); set(lastSeenRef, { timestamp: Date.now() }); });
setInterval(() => set(presenceRef, { online: true, timestamp: Date.now() }), 30000);

const typingRef = ref(rtdb, 'typing/' + userName);
const messageInput = document.getElementById('messageInput');
let typingTimeout;
messageInput.addEventListener('input', () => {
  set(typingRef, { typing: true, timestamp: Date.now() });
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => set(typingRef, { typing: false, timestamp: Date.now() }), 2000);
});

onValue(ref(rtdb, 'typing'), (snapshot) => {
  const data = snapshot.val() || {};
  const typingIndicator = document.getElementById('typingIndicator');
  let isTyping = false, typingUser = '';
  Object.keys(data).forEach(user => {
    if (user !== userName && data[user].typing && Date.now() - data[user].timestamp < 3000) { isTyping = true; typingUser = user; }
  });
  if (isTyping) { typingIndicator.querySelector('.typing-name').textContent = typingUser; typingIndicator.classList.remove('hidden'); } 
  else typingIndicator.classList.add('hidden');
});

const searchBar = document.getElementById('searchBar');
document.getElementById('searchBtn').addEventListener('click', () => { searchBar.classList.toggle('hidden'); if (!searchBar.classList.contains('hidden')) document.getElementById('searchInput').focus(); });
document.getElementById('closeSearch').addEventListener('click', () => { searchBar.classList.add('hidden'); document.getElementById('searchInput').value = ''; renderMessages(allMessages); });
document.getElementById('searchInput').addEventListener('input', (e) => {
  const term = e.target.value.toLowerCase();
  renderMessages(term ? allMessages.filter(m => m.data.text && m.data.text.toLowerCase().includes(term)) : allMessages);
});

const emojiPicker = document.getElementById('emojiPicker');
document.getElementById('emojiBtn').addEventListener('click', (e) => { e.stopPropagation(); emojiPicker.classList.toggle('active'); });
document.querySelectorAll('.emoji-grid span').forEach(em => em.addEventListener('click', () => { messageInput.value += em.textContent; emojiPicker.classList.remove('active'); }));

const attachBtn = document.getElementById('attachBtn');
const attachMenu = document.getElementById('attachMenu');
let mediaRecorder, audioChunks = [];

// Attach button logic: acts as Stop button if recording, otherwise opens menu
attachBtn.addEventListener('click', (e) => {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    return;
  }
  e.stopPropagation();
  attachMenu.classList.toggle('hidden');
});

document.addEventListener('click', (e) => {
  if (!attachMenu.contains(e.target) && e.target.id !== 'attachBtn') attachMenu.classList.add('hidden');
  if (!emojiPicker.contains(e.target) && e.target.id !== 'emojiBtn') emojiPicker.classList.remove('active');
});

document.getElementById('imageBtn').addEventListener('click', () => document.getElementById('imageUpload').click());
document.getElementById('imageUpload').addEventListener('change', (e) => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    const img = new Image();
    img.onload = async () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > 800 || h > 800) { if (w > h) { h = (h * 800) / w; w = 800; } else { w = (w * 800) / h; h = 800; } }
      canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      await sendMessage({ type: 'image', image: canvas.toDataURL('image/jpeg', 0.7), text: '' });
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file); e.target.value = '';
});

document.getElementById('locationBtn').addEventListener('click', () => {
  if (!navigator.geolocation) { alert('Geolocation not supported'); return; }
  navigator.geolocation.getCurrentPosition(async (pos) => {
    await sendMessage({ type: 'location', lat: pos.coords.latitude, lng: pos.coords.longitude, text: '' });
    attachMenu.classList.add('hidden');
  }, (err) => alert('Could not get location: ' + err.message));
});

document.getElementById('voiceRecordBtn').addEventListener('click', async () => {
  attachMenu.classList.add('hidden');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
    
    mediaRecorder.onstop = async () => {
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      const reader = new FileReader();
      reader.onload = async (ev) => { await sendMessage({ type: 'voice', audio: ev.target.result }); };
      reader.readAsDataURL(blob); 
      stream.getTracks().forEach(t => t.stop());
      
      // CONVERT BACK TO ATTACH BUTTON
      attachBtn.innerHTML = '<i class="fa-solid fa-plus"></i>';
      attachBtn.classList.remove('recording');
      messageInput.placeholder = "Type a message...";
    };
    
    mediaRecorder.start();
    
    // CONVERT ATTACH BUTTON TO STOP BUTTON
    attachBtn.innerHTML = '<i class="fa-solid fa-stop" style="color:#F44336"></i>';
    attachBtn.classList.add('recording');
    messageInput.placeholder = "🎙️ Recording...";
  } catch (err) { 
    alert('Microphone access denied'); 
  }
});

let currentReply = null;
const replyPreview = document.getElementById('replyPreview');
function setReply(msg) { currentReply = msg; document.getElementById('replyName').textContent = msg.data.sender; document.getElementById('replyText').textContent = msg.data.text || '[Attachment]'; replyPreview.classList.remove('hidden'); messageInput.focus(); }
function cancelReply() { currentReply = null; replyPreview.classList.add('hidden'); }
document.getElementById('cancelReply').addEventListener('click', cancelReply);

const sendMessage = async (extra = {}) => {
  const text = messageInput.value.trim();
  if (!text && !extra.type) return;
  try {
    await addDoc(collection(db, 'messages'), {
      sender: userName, text: text, timestamp: serverTimestamp(), reactions: {}, readBy: [userName], pinned: false,
      replyTo: currentReply ? currentReply.id : null, replyText: currentReply ? currentReply.data.text : null, replySender: currentReply ? currentReply.data.sender : null, ...extra
    });
    messageInput.value = ''; cancelReply();
  } catch (err) { console.error(err); }
};

document.getElementById('sendBtn').addEventListener('click', () => sendMessage());
messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

const messagesDiv = document.getElementById('messages');
let allMessages = [], pinnedMessages = [];

const q = query(collection(db, 'messages'), orderBy('timestamp', 'asc'));
onSnapshot(q, async (snapshot) => {
  allMessages = snapshot.docs.map(d => ({ id: d.id, data: d.data() }));
  const unread = allMessages.filter(m => m.data.sender !== userName && (!m.data.readBy || !m.data.readBy.includes(userName)));
  for (const m of unread) { try { await updateDoc(doc(db, 'messages', m.id), { readBy: arrayUnion(userName) }); } catch (e) {} }
  pinnedMessages = allMessages.filter(m => m.data.pinned);
  renderMessages(allMessages);
  renderPinned();
  
  // ALWAYS SHOW BELOW OF THE CHAT (LIKE WHATSAPP)
  setTimeout(() => {
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }, 150);
});

function renderMessages(msgs) {
  messagesDiv.innerHTML = '';
  msgs.forEach(msg => {
    const data = msg.data;
    
    // AUTO DISAPPEAR IF DELETED BY ADMIN OR USER
    if (data.deleted) return;

    const isMe = data.sender === userName;
    const msgEl = document.createElement('div');
    msgEl.className = `message ${isMe ? 'sent' : 'received'}`;
    if (data.pinned) msgEl.classList.add('pinned');
    
    let contentHtml = '';
    if (data.type === 'image') {
      contentHtml = `<img src="${data.image}" class="msg-image" alt="image">`;
    } else if (data.type === 'voice') {
      contentHtml = `<div class="voice-msg"><button class="play-voice" data-src="${data.audio}"><i class="fa-solid fa-play"></i></button><span>Voice message</span></div>`;
    } else if (data.type === 'location') {
      contentHtml = `<a href="https://maps.google.com/?q=${data.lat},${data.lng}" target="_blank" class="location-msg"><i class="fa-solid fa-location-dot"></i> View Location</a>`;
    } else {
      contentHtml = escapeHtml(data.text) + (data.edited ? ' <span style="font-size:10px;opacity:0.6">edited</span>' : '');
    }
    
    const reactions = data.reactions || {};
    const reactionHtml = Object.keys(reactions).length ? `<div class="reactions">${Object.entries(reactions).map(([u,r]) => `<span title="${u}">${r}</span>`).join('')}</div>` : '';
    const replyHtml = data.replyTo ? `<div class="reply-bubble"><div class="reply-sender">${data.replySender}</div><div class="reply-text">${data.replyText || '[Attachment]'}</div></div>` : '';
    const readHtml = isMe ? `<div class="read-receipt">${data.readBy && data.readBy.length > 1 ? '<i class="fa-solid fa-check-double" style="color:#4FC3F7"></i>' : '<i class="fa-solid fa-check"></i>'}</div>` : '';
    const pinIcon = data.pinned ? '<i class="fa-solid fa-thumbtack pin-icon"></i>' : '';
    
    msgEl.innerHTML = `
      <div class="message-bubble" data-id="${msg.id}">
        ${pinIcon}${replyHtml}
        <div class="message-sender">${data.sender}</div>
        <div class="message-text">${contentHtml}</div>
        ${reactionHtml}
        <div class="message-time">${formatTime(data.timestamp)} ${readHtml}</div>
      </div>
      <button class="react-btn" data-id="${msg.id}"><i class="fa-regular fa-face-smile"></i></button>
    `;
    messagesDiv.appendChild(msgEl);
  });
}

function renderPinned() {
  const pinnedDiv = document.getElementById('pinnedMessages');
  const pinnedList = document.getElementById('pinnedList');
  if (pinnedMessages.length === 0) { pinnedDiv.classList.add('hidden'); return; }
  pinnedDiv.classList.remove('hidden');
  pinnedList.innerHTML = '';
  pinnedMessages.slice(0, 3).forEach(msg => {
    const div = document.createElement('div');
    div.className = 'pinned-item';
    div.innerHTML = `<div class="pinned-sender">${msg.data.sender}</div><div class="pinned-text">${msg.data.text || '[Attachment]'}</div>`;
    pinnedList.appendChild(div);
  });
}
document.getElementById('closePinned').addEventListener('click', () => document.getElementById('pinnedMessages').classList.add('hidden'));

const reactionPicker = document.getElementById('reactionPicker');
let activeMsgId = null;
document.addEventListener('click', (e) => {
  const btn = e.target.closest('.react-btn');
  if (btn) {
    activeMsgId = btn.dataset.id;
    const rect = btn.getBoundingClientRect();
    reactionPicker.style.top = (rect.top - 50) + 'px';
    reactionPicker.style.left = Math.max(10, rect.left - 100) + 'px';
    reactionPicker.classList.add('active');
  } else if (!reactionPicker.contains(e.target)) reactionPicker.classList.remove('active');
});
document.querySelectorAll('#reactionPicker span').forEach(r => {
  r.addEventListener('click', async () => {
    if (!activeMsgId) return;
    const msgRef = doc(db, 'messages', activeMsgId);
    const updates = {};
    updates['reactions.' + userName] = r.dataset.reaction;
    await updateDoc(msgRef, updates);
    reactionPicker.classList.remove('active');
  });
});

let longPressTimer, selectedMsg = null, isMeSelected = false;
const msgOptions = document.getElementById('msgOptions');
messagesDiv.addEventListener('mousedown', startPress);
messagesDiv.addEventListener('touchstart', startPress);
messagesDiv.addEventListener('mouseup', endPress);
messagesDiv.addEventListener('touchend', endPress);
messagesDiv.addEventListener('mouseleave', endPress);

function startPress(e) {
  const bubble = e.target.closest('.message-bubble');
  if (!bubble) return;
  selectedMsg = allMessages.find(m => m.id === bubble.dataset.id);
  isMeSelected = selectedMsg.data.sender === userName;
  longPressTimer = setTimeout(() => {
    const rect = bubble.getBoundingClientRect();
    msgOptions.style.top = (rect.top + window.scrollY - 150) + 'px';
    msgOptions.style.left = Math.max(10, rect.left + window.scrollX - 50) + 'px';
    document.getElementById('editMsgBtn').classList.toggle('hidden', !isMeSelected);
    document.getElementById('deleteMsgBtn').classList.toggle('hidden', !isMeSelected);
    msgOptions.classList.remove('hidden');
    if (navigator.vibrate) navigator.vibrate(50);
  }, 500);
}
function endPress() { clearTimeout(longPressTimer); }
document.addEventListener('click', (e) => { if (!msgOptions.contains(e.target)) msgOptions.classList.add('hidden'); });

document.querySelectorAll('#msgOptions button').forEach(btn => {
  btn.addEventListener('click', async () => {
    if (!selectedMsg) return;
    const action = btn.dataset.action;
    const msgRef = doc(db, 'messages', selectedMsg.id);
    if (action === 'reply') setReply(selectedMsg);
    else if (action === 'copy' && selectedMsg.data.text) navigator.clipboard.writeText(selectedMsg.data.text);
    else if (action === 'edit' && isMeSelected) {
      const newText = prompt('Edit your message:', selectedMsg.data.text);
      if (newText && newText.trim() !== '') await updateDoc(msgRef, { text: newText.trim(), edited: true });
    } else if (action === 'delete' && isMeSelected) {
      if (confirm('Delete this message for everyone?')) await updateDoc(msgRef, { text: '', deleted: true, deletedBy: userName });
    }
    msgOptions.classList.add('hidden');
  });
});

document.addEventListener('click', (e) => {
  const btn = e.target.closest('.play-voice');
  if (btn) {
    const audio = new Audio(btn.dataset.src);
    audio.play();
    btn.innerHTML = '<i class="fa-solid fa-pause"></i>';
    audio.onended = () => { btn.innerHTML = '<i class="fa-solid fa-play"></i>'; };
    btn.onclick = () => { if (audio.paused) { audio.play(); btn.innerHTML = '<i class="fa-solid fa-pause"></i>'; } else { audio.pause(); btn.innerHTML = '<i class="fa-solid fa-play"></i>'; } };
  }
});

function closeAllPopups() { emojiPicker.classList.remove('active'); attachMenu.classList.add('hidden'); reactionPicker.classList.remove('active'); msgOptions.classList.add('hidden'); }
function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
function formatTime(ts) { if (!ts) return ''; const d = ts.toDate(); return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
</script>
</body>
</html>
