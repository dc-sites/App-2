<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome 💙</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
<meta name="theme-color" content="#87CEEB">
</head>
<body class="entry-body">
<div class="entry-container">
  <div class="entry-card">
    <div class="logo-circle"><i class="fa-solid fa-heart"></i></div>
    <h1 class="entry-title">Welcome, My Love</h1>
    <p class="entry-subtitle">Enter your name to continue</p>
    <div class="input-group">
      <i class="fa-solid fa-user input-icon"></i>
      <input type="text" id="nameInput" placeholder="Your beautiful name" maxlength="20" autocomplete="off">
    </div>
    <button id="enterBtn" class="btn-primary">
      <i class="fa-solid fa-arrow-right-to-bracket"></i> Enter Our World
    </button>
    <p class="hint-text"><i class="fa-solid fa-circle-info"></i> Name cannot be changed later</p>
  </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const savedName = localStorage.getItem('userName');
  if (savedName) { window.location.href = 'dashboard.html'; return; }
  const nameInput = document.getElementById('nameInput');
  const enterBtn = document.getElementById('enterBtn');
  const go = () => {
    const name = nameInput.value.trim();
    if (name.length < 2) {
      nameInput.classList.add('shake');
      setTimeout(() => nameInput.classList.remove('shake'), 500);
      return;
    }
    localStorage.setItem('userName', name);
    window.location.href = 'dashboard.html';
  };
  enterBtn.addEventListener('click', go);
  nameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') go(); });
});
</script>
</body>
</html>
