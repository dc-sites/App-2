<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories 💾</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
<meta name="theme-color" content="#87CEEB">
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'lightblue');</script>
</head>
<body class="memories-body">

<header class="topbar">
  <a href="dashboard.html" class="icon-btn"><i class="fa-solid fa-arrow-left"></i></a>
  <div class="topbar-title"><i class="fa-solid fa-images"></i><span>Our Memories</span></div>
  <div style="width:40px"></div>
</header>

<main class="memories-container">
  <div class="memories-header">
    <i class="fa-solid fa-photo-film"></i>
    <h1>Our Precious Memories</h1>
    <p>Download and cherish our moments together</p>
  </div>
  <div class="memories-grid">
    <div class="memory-card" data-file="memory1.zip">
      <div class="memory-icon"><i class="fa-solid fa-folder-open"></i></div>
      <h3>Memory 01</h3><p>Our first moments</p>
      <button class="download-btn"><i class="fa-solid fa-download"></i> Download</button>
    </div>
    <div class="memory-card" data-file="memory2.zip">
      <div class="memory-icon"><i class="fa-solid fa-folder-open"></i></div>
      <h3>Memory 02</h3><p>Special days</p>
      <button class="download-btn"><i class="fa-solid fa-download"></i> Download</button>
    </div>
    <div class="memory-card" data-file="memories/memory3.zip">
      <div class="memory-icon"><i class="fa-solid fa-folder-open"></i></div>
      <h3>Memory 03</h3><p>Adventures together</p>
      <button class="download-btn"><i class="fa-solid fa-download"></i> Download</button>
    </div>
    <div class="memory-card" data-file="memories/memory4.zip">
      <div class="memory-icon"><i class="fa-solid fa-folder-open"></i></div>
      <h3>Memory 04</h3><p>Fun times</p>
      <button class="download-btn"><i class="fa-solid fa-download"></i> Download</button>
    </div>
    <div class="memory-card" data-file="memories/memory5.zip">
      <div class="memory-icon"><i class="fa-solid fa-folder-open"></i></div>
      <h3>Memory 05</h3><p>Forever memories</p>
      <button class="download-btn"><i class="fa-solid fa-download"></i> Download</button>
    </div>
  </div>
</main>

<footer class="app-footer">
  <div class="footer-divider"></div>
  <p>Designed by <a href="#">Your Crazy Bf</a> 💙</p>
</footer>

<script>
document.querySelectorAll('.memory-card').forEach(card => {
  card.querySelector('.download-btn').addEventListener('click', () => {
    const file = card.dataset.file;
    const a = document.createElement('a');
    a.href = file; a.download = file.split('/').pop();
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  });
});
</script>
</body>
</html>
