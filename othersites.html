<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Other Sites 🌐</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
<meta name="theme-color" content="#87CEEB">
</head>
<body class="sites-body">

<header class="topbar">
  <a href="chat.html" class="icon-btn"><i class="fa-solid fa-arrow-left"></i></a>
  <div class="topbar-title"><i class="fa-solid fa-globe"></i><span>Other Sites</span></div>
  <div style="width:40px"></div>
</header>

<main class="sites-container">
  <div class="sites-grid">
    <a href="https://youtube.com" target="_blank" class="site-card">
      <div class="site-img" style="background:linear-gradient(135deg,#FF0000,#CC0000)">
        <i class="fa-brands fa-youtube"></i>
      </div>
      <h3>YouTube</h3>
      <p>Watch videos together</p>
    </a>
    <a href="https://spotify.com" target="_blank" class="site-card">
      <div class="site-img" style="background:linear-gradient(135deg,#1DB954,#169c46)">
        <i class="fa-brands fa-spotify"></i>
      </div>
      <h3>Spotify</h3>
      <p>Listen to music</p>
    </a>
    <a href="https://instagram.com" target="_blank" class="site-card">
      <div class="site-img" style="background:linear-gradient(135deg,#833AB4,#FD1D1D,#FCB045)">
        <i class="fa-brands fa-instagram"></i>
      </div>
      <h3>Instagram</h3>
      <p>Share photos</p>
    </a>
    <a href="https://netflix.com" target="_blank" class="site-card">
      <div class="site-img" style="background:linear-gradient(135deg,#E50914,#B81D24)">
        <i class="fa-solid fa-film"></i>
      </div>
      <h3>Netflix</h3>
      <p>Watch movies</p>
    </a>
    <a href="https://google.com" target="_blank" class="site-card">
      <div class="site-img" style="background:linear-gradient(135deg,#4285F4,#34A853,#FBBC05,#EA4335)">
        <i class="fa-brands fa-google"></i>
      </div>
      <h3>Google</h3>
      <p>Search anything</p>
    </a>
  </div>
</main>

<footer class="app-footer">
  <div class="footer-divider"></div>
  <p>Designed by <a href="#">Your Crazy Bf</a> 💙</p>
</footer>
</body>
</html>
